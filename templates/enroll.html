{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-4">
    <h2 class="text-2xl font-bold mb-6 text-center">Face Enrollment</h2>

    <!-- Step 1: Info -->
    <div id="step1" class="glass p-6 rounded-xl space-y-4">
        <div>
            <label class="block text-sm text-gray-400 mb-1">Full Name</label>
            <input type="text" id="nameInput"
                class="w-full bg-black/30 border border-gray-700 rounded p-2 focus:border-accent outline-none text-white"
                placeholder="e.g. John Doe">
        </div>
        <div>
            <label class="block text-sm text-gray-400 mb-1">Register Number</label>
            <input type="text" id="regInput"
                class="w-full bg-black/30 border border-gray-700 rounded p-2 focus:border-accent outline-none text-white"
                placeholder="e.g. RA2111003010xxx">
        </div>
        <button onclick="goToCamera()"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded transition">
            Next <i class="fas fa-arrow-right ml-2"></i>
        </button>
    </div>

    <!-- Step 2: Camera Burst -->
    <div id="step2" class="hidden relative">
        <div class="relative w-full aspect-[3/4] bg-black rounded-2xl overflow-hidden border-2 border-gray-800">
            <video id="video" class="absolute inset-0 w-full h-full object-cover" style="transform: scaleX(-1);"
                autoplay playsinline></video>

            <!-- Android-style Face Circle Overlay -->
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div id="faceGuide"
                    class="w-64 h-64 border-2 border-white/30 rounded-full shadow-[0_0_0_999px_rgba(0,0,0,0.8)] relative transition-all duration-300">
                    <!-- Progress Ring (SVG) -->
                    <svg class="absolute -top-1 -left-1 w-[260px] h-[260px] rotate-[-90deg]">
                        <circle cx="130" cy="130" r="128" stroke="currentColor" stroke-width="4" fill="transparent"
                            class="text-transparent" />
                        <circle id="progressRing" cx="130" cy="130" r="128" stroke="#64ffda" stroke-width="4"
                            fill="transparent" stroke-dasharray="804" stroke-dashoffset="804"
                            class="transition-all duration-300" />
                    </svg>
                </div>
            </div>

            <!-- Feedback Text -->
            <div class="absolute bottom-20 left-0 right-0 text-center pointer-events-none">
                <p id="feedbackText" class="text-xl font-medium text-white drop-shadow-md">Align face in circle</p>
            </div>
        </div>

        <button id="captureBtn" onclick="startBurst()"
            class="w-full mt-4 bg-accent text-black font-bold py-4 rounded-xl text-lg hover:bg-emerald-400 transition shadow-[0_0_20px_rgba(100,255,218,0.3)]">
            <i class="fas fa-camera mr-2"></i> Start Capture
        </button>
    </div>

    <!-- Step 3: Success -->
    <div id="step3" class="hidden text-center mt-12 space-y-6">
        <div
            class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto shadow-[0_0_30px_rgba(34,197,94,0.5)]">
            <i class="fas fa-check text-4xl text-black"></i>
        </div>
        <h3 class="text-2xl font-bold">Enrollment Complete!</h3>
        <p class="text-gray-400">Student data saved and model updated.</p>
        <a href="/" class="inline-block bg-gray-700 hover:bg-gray-600 px-8 py-3 rounded text-white">Back Home</a>
    </div>
</div>

<script>
    let stream;
    let images = [];
    const TOTAL_FRAMES = 10;

    // On Load: Check for URL params
    window.onload = function () {
        const params = new URLSearchParams(window.location.search);
        const pName = params.get('name');
        const pReg = params.get('reg_no');
        const pMode = params.get('mode');

        if (pName) document.getElementById('nameInput').value = pName;
        if (pReg) {
            document.getElementById('regInput').value = pReg;
            document.getElementById('regInput').disabled = true; // Lock ID to prevent mistakes
        }

        if (pMode === 'append') {
            document.querySelector('h2').innerText = "Add More Photos";
            document.getElementById('nameInput').disabled = true;
            document.getElementById('feedbackText').innerText = "Taking EXTRA photos to improve accuracy";
        }
    };

    function goToCamera() {
        const name = document.getElementById('nameInput').value;
        const reg = document.getElementById('regInput').value;
        if (!name || !reg) { alert("Please fill all fields"); return; }

        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        startCamera();
    }

    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            document.getElementById('video').srcObject = stream;
        } catch (err) {
            alert("Camera access denied: " + err.message);
        }
    }

    async function startBurst() {
        const btn = document.getElementById('captureBtn');
        const feedback = document.getElementById('feedbackText');
        const ring = document.getElementById('progressRing');
        const guide = document.getElementById('faceGuide');

        btn.disabled = true;
        btn.innerText = "Capturing...";
        guide.classList.add('scale-105'); // Pulse effect

        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        images = [];

        // Capture loop
        for (let i = 1; i <= TOTAL_FRAMES; i++) {
            feedback.innerText = `Capturing ${i}/${TOTAL_FRAMES}... move head slightly`;

            // Update Ring
            const offset = 804 - (804 * i / TOTAL_FRAMES);
            ring.style.strokeDashoffset = offset;

            // Capture frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            images.push(canvas.toDataURL('image/jpeg', 0.8));

            await new Promise(r => setTimeout(r, 400)); // 400ms delay between shots
        }

        feedback.innerText = "Processing...";
        stopCamera();
        submitData();
    }

    function stopCamera() {
        if (stream) stream.getTracks().forEach(track => track.stop());
    }

    async function submitData() {
        const name = document.getElementById('nameInput').value;
        const reg = document.getElementById('regInput').value;

        try {
            const res = await fetch('/api/enroll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, reg_no: reg, images })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('step2').classList.add('hidden');
                document.getElementById('step3').classList.remove('hidden');
            } else {
                alert("Error: " + (data.display_error || data.error));
                location.reload();
            }
        } catch (err) {
            alert("Network Error: " + err.message);
        }
    }
</script>
{% endblock %}
