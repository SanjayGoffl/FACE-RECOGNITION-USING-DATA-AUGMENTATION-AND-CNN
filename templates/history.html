{% extends "base.html" %}

{% block content %}
<div class="space-y-6">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <h2 class="text-2xl font-bold">Attendance History</h2>

        <!-- Date Picker -->
        <div class="flex items-center gap-2 bg-white/5 p-2 rounded-lg border border-gray-700">
            <span class="text-gray-400 text-sm"><i class="far fa-calendar-alt"></i> Select Date:</span>
            <input type="date" id="historyDate"
                class="bg-transparent text-white focus:outline-none text-sm cursor-pointer ml-2">
            <button onclick="loadHistory()"
                class="bg-accent/20 hover:bg-accent/30 text-accent px-3 py-1 rounded text-sm transition font-bold">
                View
            </button>
            <button onclick="exportToCSV()"
                class="bg-green-600/20 hover:bg-green-600/30 text-green-400 px-3 py-1 rounded text-sm transition font-bold border border-green-600/30 ml-2">
                <i class="fas fa-file-csv mr-1"></i> Export CSV
            </button>
        </div>
    </div>

    <!-- History Results -->
    <div class="glass p-6 rounded-xl overflow-hidden min-h-[400px]">
        <table class="w-full text-left">
            <thead class="text-gray-400 border-b border-gray-700">
                <tr>
                    <th class="pb-3 pl-2">Time</th>
                    <th class="pb-3">Name</th>
                    <th class="pb-3">Reg No</th>
                    <th class="pb-3">Method</th>
                    <th class="pb-3 text-right">Confidence</th>
                </tr>
            </thead>
            <tbody id="historyTable" class="text-gray-200">
                <tr>
                    <td colspan="5" class="py-10 text-center text-gray-500">
                        Select a date to view attendance records.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Set default date to today
    document.getElementById('historyDate').valueAsDate = new Date();

    async function loadHistory() {
        const dateVal = document.getElementById('historyDate').value;
        if (!dateVal) return;

        const tbody = document.getElementById('historyTable');
        tbody.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-gray-500">Loading records...</td></tr>';

        try {
            const res = await fetch(`/api/history?date=${dateVal}`);
            const logs = await res.json();
            tbody.innerHTML = '';

            if (logs.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-gray-500">No attendance records found for this date.</td></tr>';
                return;
            }

            logs.forEach(log => {
                const date = new Date(log.timestamp);
                const timeStr = date.toLocaleTimeString(); // e.g. "10:30:00 AM"

                const row = `
                <tr class="border-b border-gray-800 hover:bg-white/5 transition">
                    <td class="py-4 pl-2 font-mono text-sm text-gray-400">${timeStr}</td>
                    <td class="py-4 font-medium">${log.name}</td>
                    <td class="py-4 font-mono text-sm text-gray-400">${log.reg_no}</td>
                    <td class="py-4 text-sm text-gray-500 capitalize">${log.method || 'Manual'}</td>
                    <td class="py-4 text-right">
                        <span class="bg-green-500/10 text-green-400 px-2 py-1 rounded text-xs font-bold border border-green-500/20">
                            ${(log.confidence * 100).toFixed(0)}%
                        </span>
                    </td>
                </tr>
                `;
                tbody.innerHTML += row;
            });

        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="5" class="py-10 text-center text-red-500">Error: ${err.message}</td></tr>`;
        }
    }

    // Auto load today
    loadHistory();

    function exportToCSV() {
        const dateVal = document.getElementById('historyDate').value;
        const rows = document.querySelectorAll('#historyTable tr');

        if (rows.length <= 1 && rows[0].innerText.includes('No attendance')) {
            alert("No data to export!");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Time,Name,Reg No,Method,Confidence\n"; // Header

        rows.forEach(row => {
            const cols = row.querySelectorAll('td');
            if (cols.length > 1) { // Skip loading/empty message rows
                const rowData = [];
                // Extract clean text from columns
                rowData.push(cols[0].innerText.trim()); // Time
                rowData.push(cols[1].innerText.trim()); // Name
                rowData.push(cols[2].innerText.trim()); // Reg No
                rowData.push(cols[3].innerText.trim()); // Method
                rowData.push(cols[4].innerText.trim().replace('%', '')); // Confidence

                csvContent += rowData.join(",") + "\n";
            }
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `attendance_${dateVal}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
{% endblock %}
