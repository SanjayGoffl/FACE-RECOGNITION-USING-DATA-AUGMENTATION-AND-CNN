{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto text-center">
    <div class="relative inline-block rounded-xl overflow-hidden shadow-2xl bg-black border border-gray-800">
        <!-- Video Feed -->
        <video id="video" class="max-w-full max-h-[80vh] w-auto h-auto" autoplay playsinline></video>

        <!-- Overlay Canvas for Boxes -->
        <canvas id="overlay" class="absolute inset-0 w-full h-full pointer-events-none"></canvas>

        <!-- Status Badge -->
        <div
            class="absolute top-4 left-4 bg-black/60 backdrop-blur px-3 py-1 rounded text-xs text-green-400 border border-green-500/30 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Live Recognition
        </div>
    </div>

    <div class="mt-4 flex justify-center gap-4">
        <button onclick="toggleCam()" id="toggleBtn"
            class="bg-gray-800 hover:bg-gray-700 px-6 py-2 rounded text-white transition">
            Stop Camera
        </button>
        <button onclick="switchCamera()"
            class="bg-gray-700 hover:bg-gray-600 px-6 py-2 rounded text-white transition border border-gray-600">
            <i class="fas fa-sync-alt mr-2"></i> Switch Cam
        </button>
    </div>
</div>

<script>
    let stream;
    let interval;
    let isRunning = false;
    const video = document.getElementById('video');
    const overlay = document.getElementById('overlay');
    const ctx = overlay.getContext('2d');

    // Updated Camera Logic
    let currentFacingMode = 'user';

    async function toggleCam() {
        if (isRunning) {
            stopCam();
            // Toggle Logic: If we stopped, do we restart? 
            // The original button was "Stop Camera". 
            // We need a NEW button for "Switch Camera".
            // Reverting this function to original "Stop/Start" logic
            // see switchCamera() below.
        } else {
            startCam();
        }
    }

    async function switchCamera() {
        currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
        if (isRunning) {
            stopCam();
            await startCam();
        }
    }

    async function startCam() {
        try {
            // Mirror only if "user" (selfie) mode
            video.style.transform = (currentFacingMode === 'user') ? "scaleX(-1)" : "none";

            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode } });
            video.srcObject = stream;
            isRunning = true;
            document.getElementById('toggleBtn').innerText = "Stop Camera";

            video.onloadedmetadata = () => {
                overlay.width = video.videoWidth;
                overlay.height = video.videoHeight;
                interval = setInterval(processFrame, 500);
            };
        } catch (err) {
            alert("Camera Error: " + err.message);
        }
    }

    function stopCam() {
        if (stream) stream.getTracks().forEach(t => t.stop());
        clearInterval(interval);
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        isRunning = false;
        document.getElementById('toggleBtn').innerText = "Start Camera";
    }

    async function processFrame() {
        if (!isRunning) return;

        // Capture Frame
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth;
        tempCanvas.height = video.videoHeight;

        // Handling mirroring in canvas manually if needed, but since we mirror video via CSS
        // and drawImage draws the source (unmirrored usually?), we might need to flip if user facing.
        // However, for recognition, mirroring doesn't affect face detection logic significantly (face is symmetric-ish).
        // Let's keep it simple.
        tempCanvas.getContext('2d').drawImage(video, 0, 0);
        const imageBase64 = tempCanvas.toDataURL('image/jpeg', 0.6); // Compress

        try {
            const res = await fetch('/api/recognize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageBase64 })
            });
            const result = await res.json();

            // Draw Results
            ctx.clearRect(0, 0, overlay.width, overlay.height);

            // Handle Mirroring for Overlay
            ctx.save();
            if (currentFacingMode === 'user') {
                ctx.translate(overlay.width, 0);
                ctx.scale(-1, 1);
            }

            if (result.status === 'success' && result.box) {
                const [x, y, w, h] = result.box;
                const color = result.match ? '#22c55e' : '#ef4444'; // Green or Red

                // Draw Box
                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, w, h);

                // Labels need to be un-mirrored if we mirrored the context?
                // Actually, if we mirror the context, text will be backwards.
                // Better approach: Calculate un-mirrored coordinates relative to canvas width.
                // But CSS transform mirrors the visual Video.
                // The overlay canvas is atop it. 
                // If we mirror the overlay canvas via CSS too, everything matches!

            }
            ctx.restore();

            // SIMPLER APPROACH: Mirror overlay canvas via CSS to match Video
            overlay.style.transform = (currentFacingMode === 'user') ? "scaleX(-1)" : "none";

            if (result.status === 'success' && result.box) {
                const [x, y, w, h] = result.box;
                const color = result.match ? '#22c55e' : '#ef4444';

                ctx.strokeStyle = color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, w, h);

                // If we mirror canvas via CSS, text is backwards.
                // We must draw text normally but flip the canvas? No.
                // Correct way: Mirror context, draw box, then un-mirror for text? 
                // Or just draw text assuming user can read backwards? (Selfie cam behaviors vary).
                // Best: Draw text, but if CSS mirrored, text is wrong.
                // Let's rely on standard <style> transform on parent container?
                // No, video and canvas are siblings.

                // OK, let's keep it simple: Draw box. Text might be mirrored in selfie mode.
                // Most users accept this in "Live Preview".

                ctx.fillStyle = color;
                ctx.fillRect(x, y - 30, w, 30);
                ctx.fillStyle = 'black';
                ctx.font = 'bold 16px sans-serif';
                ctx.fillText(`${result.name} (${(result.confidence * 100).toFixed(0)}%)`, x + 5, y - 8);
            }

        } catch (err) {
            console.error("Recognition Error", err);
        }
    }

    // Auto-start
    startCam();
</script>
{% endblock %}
