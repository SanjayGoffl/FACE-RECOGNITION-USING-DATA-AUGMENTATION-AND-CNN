<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#0a192f',
                        accent: '#64ffda',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0d1117;
            color: #e6edf3;
        }

        .glass {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">
    <nav class="p-4 glass sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-id-badge text-accent"></i> Smart Attendance
            </a>
            <div class="space-x-4">
                <a href="/" class="hover:text-accent">Home</a>
                <a href="/enroll" class="hover:text-accent">Enroll</a>
                <a href="/attendance" class="hover:text-accent">Scan</a>
                <a href="/history" class="hover:text-accent">History</a>
                <a href="/dashboard" class="hover:text-accent text-purple-400 font-bold"><i
                        class="fas fa-chart-pie mr-1"></i></a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="p-4 text-center text-gray-500 text-sm">
        &copy; 2025 Smart Attendance System
    </footer>
</body>

</html>
